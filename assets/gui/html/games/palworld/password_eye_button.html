<button type="button" class="password-eye" aria-label="{{label}}" data-show="{{label}}" data-hide="{{hide_label}}">
  <span data-password-icon="show">{{#icon}}{{& pywebio_output_parse}}{{/icon}}</span>
  <span data-password-icon="hide" hidden>{{#hidden_icon}}{{& pywebio_output_parse}}{{/hidden_icon}}</span>
</button>
