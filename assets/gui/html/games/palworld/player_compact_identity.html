<div class="player-name" data-player-field="name">{{name}}</div>
<div class="player-uid-row" data-player-id-row>
  <span class="player-uid" data-player-id-value data-player-id-masked-value="{{userid_masked}}" data-player-id-visible-value="{{userid_visible}}">{{userid_masked}}</span>
  <button type="button" class="player-id-toggle player-id-toggle-compact" data-player-id-toggle aria-label="{{show}}" data-show="{{show}}" data-hide="{{hide}}">
    <span data-player-id-icon="show">{{#icon}}{{& pywebio_output_parse}}{{/icon}}</span>
    <span data-player-id-icon="hide" hidden>{{#hidden_icon}}{{& pywebio_output_parse}}{{/hidden_icon}}</span>
  </button>
</div>
