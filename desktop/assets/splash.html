<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; img-src 'self' data:" />
    <title>Palsitter</title>
    <style>
      :root {
        --bg: #12141c;
        --panel: #171a24;
        --text: #e6e8f0;
        --muted: #8b90a3;
        --accent: #6c7bf2;
        --border: rgba(255, 255, 255, 0.08);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        color: var(--text);
        background: transparent;
        user-select: none;
        cursor: default;
      }
      .card {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 28px;
        background: radial-gradient(circle at 50% 0%, var(--panel), var(--bg));
        border: 1px solid var(--border);
        border-radius: 12px;
        -webkit-app-region: drag;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        object-fit: cover;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.3px;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
      }
      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="./palsitter.png" alt="Palsitter" />
      <div class="title">Palsitter</div>
      <div class="status">
        <div class="spinner"></div>
        <span id="message">Starting Palsitter…</span>
      </div>
    </div>
    <script>
      const message = new URLSearchParams(location.search).get("message");
      if (message) document.getElementById("message").textContent = message;
    </script>
  </body>
</html>
