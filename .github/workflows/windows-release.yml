name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Preserve an updateable main branch in packaged history
        shell: pwsh
        run: git switch -C main $env:GITHUB_SHA
      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm.cmd ci
      - name: Install archive tool
        shell: pwsh
        run: choco install 7zip -y --no-progress
      - name: Assemble standalone Python runtime
        shell: pwsh
        run: .\desktop\scripts\build-runtime.ps1
      - name: Assemble bundled Git runtime
        shell: pwsh
        run: .\desktop\scripts\build-git.ps1
      - name: Stage tracked source for the editable release
        shell: pwsh
        run: .\desktop\scripts\prepare-source.ps1
      - name: Compile Python sources
        run: python -m compileall -q .
      - name: Build unpacked Electron application
        working-directory: desktop
        run: npm.cmd run build:win
      - name: Smoke-test packaged source layout
        shell: pwsh
        run: |
          if (-not (Test-Path .\desktop\dist\win-unpacked\Palsitter.exe)) { throw 'Palsitter.exe missing' }
          if (-not (Test-Path .\desktop\dist\win-unpacked\resources\app\main.js)) { throw 'Editable Electron source missing' }
          if (-not (Test-Path .\desktop\dist\win-unpacked\resources\backend\gui.py)) { throw 'Editable Python source missing' }
          if (-not (Test-Path .\desktop\dist\win-unpacked\resources\python\python.exe)) { throw 'Standalone Python missing' }
      - name: Create portable archive and checksum
        shell: pwsh
        run: .\desktop\scripts\archive-release.ps1
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/Palsitter-win-x64.7z
            desktop/dist/Palsitter-win-x64.7z.sha256
